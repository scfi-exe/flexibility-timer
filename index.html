<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexibility Timer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="phaseTitle">Ready</h1>
      <h2 id="setInfo"></h2>

      <div class="image-container">
        <img id="exerciseImage" src="" />
      </div>

      <div class="timer" id="timer">00</div>

      <div class="controls">
        <button onclick="startRoutine()">Start</button>
        <button onclick="pauseRoutine()">Pause</button>
        <button onclick="skipStep()">Skip</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
